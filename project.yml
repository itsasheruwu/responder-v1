name: Responder
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.ash.responder
    CURRENT_PROJECT_VERSION: 3
    MARKETING_VERSION: 1.0.1
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_NSAppleEventsUsageDescription: Responder needs Automation permission to send iMessage drafts through the Messages app when you explicitly enable sending or autonomy.
    INFOPLIST_KEY_NSContactsUsageDescription: Responder can use your local Contacts data to label conversations with contact names instead of raw phone numbers or email addresses.
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 7.3.0
targets:
  Responder:
    type: application
    platform: macOS
    sources:
      - path: Responder/Sources
    resources:
      - path: Responder/Resources
    dependencies:
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ash.responder
        PRODUCT_NAME: Responder
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
  ResponderTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ResponderTests
    dependencies:
      - target: Responder
      - package: GRDB
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.ash.responder.tests
        PRODUCT_NAME: ResponderTests
  ResponderUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: ResponderUITests
    dependencies:
      - target: Responder
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.ash.responder.uitests
        PRODUCT_NAME: ResponderUITests
        TEST_TARGET_NAME: Responder
